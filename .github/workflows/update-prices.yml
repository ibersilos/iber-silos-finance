name: Update ETF Prices

on:
  schedule:
    - cron: '30 17 * * 1-5'   # 18:30 CET lun-ven (dopo chiusura mercati EU)
  workflow_dispatch:            # trigger manuale da GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch prices
        run: python scripts/fetch_prices.py

      - name: Commit prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/etf_prices.json
          git diff --staged --quiet || git commit -m "chore: aggiorna prezzi ETF $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
