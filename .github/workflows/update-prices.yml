name: Update ETF Prices

on:
  schedule:
    - cron: '*/15 * * * *'   # ogni 15 minuti
  workflow_dispatch:           # trigger manuale da GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch prices → public/etf_prices.json
        run: python scripts/fetch_prices.py

      - name: Commit public/etf_prices.json [skip ci]
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/etf_prices.json
          git diff --staged --quiet || git commit -m "chore: prezzi ETF $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build app (public/etf_prices.json → dist/)
        run: npm run build

      - name: Deploy Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
